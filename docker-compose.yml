services:
  ollama:
    image: ollama/ollama:latest
    container_name: clusterpilot-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  postgres:
    image: postgres:16-alpine
    container_name: clusterpilot-postgres
    environment:
      POSTGRES_DB: clusterpilot
      POSTGRES_USER: clusterpilot
      POSTGRES_PASSWORD: clusterpilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clusterpilot -d clusterpilot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: clusterpilot-redis
    ports:
      - "6379:6379"

  control-plane:
    build:
      context: .
      dockerfile: backend/control-plane/Dockerfile
    container_name: clusterpilot-control-plane
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      CLUSTERPILOT_DATABASE_URL: postgresql+asyncpg://clusterpilot:clusterpilot@postgres:5432/clusterpilot
      CLUSTERPILOT_CELERY_BROKER_URL: redis://redis:6379/0
      CLUSTERPILOT_CELERY_RESULT_BACKEND: redis://redis:6379/1
      CLUSTERPILOT_KNOWLEDGE_STORAGE_PATH: /data/knowledge
    ports:
      - "8000:8000"
    volumes:
      - knowledge_data:/data/knowledge
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  celery-worker:
    build:
      context: .
      dockerfile: backend/control-plane/Dockerfile
    container_name: clusterpilot-celery-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      CLUSTERPILOT_DATABASE_URL: postgresql+asyncpg://clusterpilot:clusterpilot@postgres:5432/clusterpilot
      CLUSTERPILOT_CELERY_BROKER_URL: redis://redis:6379/0
      CLUSTERPILOT_CELERY_RESULT_BACKEND: redis://redis:6379/1
      CLUSTERPILOT_KNOWLEDGE_STORAGE_PATH: /data/knowledge
    command: ["celery", "-A", "app.worker.celery_app.celery_app", "worker", "--loglevel=info"]
    volumes:
      - knowledge_data:/data/knowledge

  worker-agent:
    build:
      context: .
      dockerfile: backend/worker-agent/Dockerfile
    container_name: clusterpilot-worker-agent
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      CLUSTERPILOT_CONTROL_PLANE_URL: http://control-plane:8000
      CLUSTERPILOT_NODE_ID: docker-worker-01
      CLUSTERPILOT_NODE_NAME: docker-worker-01
      CLUSTERPILOT_HEARTBEAT_SECONDS: 10

  web-dashboard:
    build:
      context: .
      dockerfile: frontend/web-dashboard/Dockerfile
    container_name: clusterpilot-web-dashboard
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      CLUSTERPILOT_API_BASE_URL: http://control-plane:8000
      NEXT_PUBLIC_CLUSTERPILOT_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  knowledge_data:
  ollama_data:
